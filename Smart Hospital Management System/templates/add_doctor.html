{% extends "base_admin.html" %}

{% block title %}Add Doctor - Smart Hospital Management System{% endblock %}
{% block page_title %}Add New Doctor{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07); padding: 30px;">
        <h4 style="color: #2d3748; font-weight: 700; margin-bottom: 25px;">
            <i class="fas fa-user-md"></i> New Doctor Registration
        </h4>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> Full Name *</label>
                <input type="text" class="form-control" name="name" placeholder="Dr. Enter name" required>
            </div>
            
            <div class="form-group">
                <label class="form-label"><i class="fas fa-envelope"></i> Email Address *</label>
                <input type="email" class="form-control" name="email" placeholder="Enter email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> Password *</label>
                <input type="password" class="form-control" name="password" placeholder="Enter password" required>
            </div>
            
            <div class="form-group">
                <label class="form-label"><i class="fas fa-stethoscope"></i> Specialty *</label>
                <select class="form-control" name="specialty_id" required>
                    <option value="">Select specialty</option>
                    {% if specialties %}
                        {% for spec in specialties %}
                        <option value="{{ spec['specialty_id'] }}">{{ spec['specialty_name'] }}</option>
                        {% endfor %}
                    {% endif %}
                </select>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-calendar"></i> Years of Experience</label>
                        <input type="number" class="form-control" name="experience" placeholder="0" min="0" max="60">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-star"></i> Rating</label>
                        <input type="number" class="form-control" name="rating" placeholder="0.0" min="0" max="5" step="0.1">
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label"><i class="fas fa-phone"></i> Contact Number</label>
                <input type="tel" class="form-control" name="contact" placeholder="Enter contact number">
            </div>
            
            <div class="form-group">
                <label class="form-label"><i class="fas fa-file-alt"></i> Biography</label>
                <textarea class="form-control" name="biography" placeholder="Enter professional biography" rows="3"></textarea>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px;">
                <a href="{{ url_for('doctors') }}" class="btn btn-secondary" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-arrow-left"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Add Doctor
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
